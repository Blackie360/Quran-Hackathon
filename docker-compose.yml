services:
  quran-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quran-hackathon
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Optional: Add Gemini API key for AI features
      # - GEMINI_API_KEY=your_gemini_api_key_here
      # - GEMINI_MODEL_URL=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "import('node:http').then(m => m.default.get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - quran-network

networks:
  quran-network:
    driver: bridge
