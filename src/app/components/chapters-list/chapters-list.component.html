<div class="chapters-container">
  <!-- Header -->
  <div class="chapters-header">
    <button class="back-btn" (click)="goBack()" title="Go back">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1>Quran Chapters</h1>
    <div class="header-space"></div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading">
    <div class="spinner"></div>
    <p>Loading chapters...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="error-message">
    <i class="fas fa-exclamation-circle"></i>
    <p>{{ error }}</p>
    <button (click)="loadChapters()" class="retry-btn">Retry</button>
  </div>

  <!-- Chapters Grid -->
  <div *ngIf="!isLoading && !error" class="chapters-grid">
    <div
      *ngFor="let chapter of chapters"
      class="chapter-card"
      (click)="selectChapter(chapter.number)"
    >
      <div class="chapter-number">{{ chapter.number }}</div>
      <div class="chapter-content">
        <h3 class="chapter-name">{{ chapter.englishName }}</h3>
        <p class="chapter-name-ar">{{ chapter.name }}</p>
        <p class="chapter-info">
          <span class="verse-count">{{ chapter.numberOfAyahs }} verses</span>
          <span class="revelation">{{ chapter.revelationType }}</span>
        </p>
      </div>
      <div class="chapter-arrow">
        <i class="fas fa-chevron-right"></i>
      </div>
    </div>
  </div>
</div>
